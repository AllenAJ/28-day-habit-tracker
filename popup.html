<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>28 Days Habit Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-titles">
          <h1>Habits</h1>
          <p class="tagline" title="This extension’s single purpose is habit tracking, including optional habit-related AI when enabled.">
            Daily habits · optional AI (ZeroGPU)
          </p>
        </div>
        <div class="date" id="todayLabel"></div>
      </header>

      <section class="new-habit">
        <input
          id="newHabitInput"
          type="text"
          placeholder="Add a new habit..."
          maxlength="80"
        />
        <button id="addHabitBtn" aria-label="Add habit">+</button>
      </section>

      <section class="sdk-controls">
        <div class="sdk-copy">
          <div class="sdk-title">Optional ZeroGPU features</div>
          <div id="sdkStatusText" class="sdk-status">Disabled</div>
        </div>
        <button id="sdkToggleBtn" class="link-btn sdk-toggle-btn">Enable</button>
      </section>

      <section class="habits" id="habitsList">
        <!-- Habits are rendered here -->
      </section>

      <section id="debugPanel" class="debug-panel hidden">
        <div class="debug-header">
          <span>Debug mode</span>
          <button id="debugRefreshBtn" class="link-btn">Refresh</button>
        </div>
        <pre id="debugStatusText" class="debug-status"></pre>
      </section>

      <section class="footer">
        <span id="statsText"></span>
        <button id="resetTodayBtn" class="link-btn">Reset today</button>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
